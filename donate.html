<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support AgentX CLI</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #10b981;
            margin-top: 0;
        }
        p {
            color: #cbd5e1;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        #paypal-button-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Support AgentX CLI</h1>
        <p>Developing and maintaining AgentX takes a lot of time and effort. Your support helps us keep building the ultimate AI coding assistant for the terminal!</p>
        
        <!-- PayPal Button Container -->
        <div id="paypal-button-container"></div>
    </div>

    <!-- PayPal JS SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=AUdQxGj-VfGNYL-MJlh8HkAExG4POULFldWk-nV3rUIwypQd5W65msgA0XQcJ73-5YE6XoXaP9ZPisju&currency=USD"></script>
    <script>
        paypal.Buttons({
            style: {
                layout: 'vertical',
                color:  'gold',
                shape:  'rect',
                label:  'paypal'
            },
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        description: 'Donation to Support AgentX CLI',
                        amount: {
                            value: '10.00' // Suggested donation amount
                        }
                    }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    alert('Thank you for your incredible support, ' + details.payer.name.given_name + '!');
                });
            }
        }).render('#paypal-button-container');
    </script>
</body>
</html>
